<div class="content">
  <h3 class="title">{{ post.title }}</h3>
  <p class="excerpt">{{ post.lead_text }}</p>

  {% if post.project_link %}
    <a href="{{ post.project_link }}" class="btn btn-primary">
      <i class="{{ post.button_icon }}"></i> {{ post.button_text }}
    </a>
  {% endif %}

  <div class="tags">
    {% for tag in post.tags %}
      <span class="badge badge-secondary">{{ tag }}</span>
    {% endfor %}
  </div>
</div>
